<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - The Railway Pub</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background-color: var(--wood-medium); }

    /* Login Gate */
    #loginGate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 1.5rem;
      padding: 1rem;
    }
    #loginGate h2 {
      font-family: var(--font-heading);
      color: var(--brass-light);
      font-size: 2rem;
      text-align: center;
    }
    #loginGate p {
      color: var(--steam-grey);
      font-family: var(--font-body);
      text-align: center;
    }
    #loginForm {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      padding: 0 1rem;
      box-sizing: border-box;
    }
    #loginError {
      color: #e74c3c;
      font-family: var(--font-body);
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    /* Admin Panel hidden by default */
    #adminPanel { display: none; }

    /* Make admin panel fully mobile friendly */
    .admin-panel {
      margin: 1rem auto;
      padding: 1.5rem 1rem;
      box-sizing: border-box;
      width: 100%;
      max-width: 800px;
    }

    /* Touch-friendly inputs */
    .admin-panel .form-control {
      font-size: 16px; /* Prevents iOS auto-zoom on focus */
      padding: 14px;
      width: 100%;
      box-sizing: border-box;
    }

    .admin-panel .btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      touch-action: manipulation;
    }

    /* Admin event list items */
    .admin-event-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
      border-left: 3px solid var(--brass-dark);
    }
    .admin-event-item div {
      flex: 1;
      min-width: 0;
      font-family: var(--font-body);
      font-size: 0.9rem;
      word-break: break-word;
    }
    .admin-event-item button {
      background: #791a1a;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .admin-event-item button:hover {
      background: #a02222;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        padding: 1rem;
        text-align: center;
        gap: 0.5rem;
      }
      #loginGate h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  
  <header>
    <a href="index.html" class="logo">Back to Main Station</a>
  </header>

  <!-- Login Gate -->
  <div id="loginGate">
    <h2>🔐 Stationmaster Access</h2>
    <p>Enter your credentials to manage the station log.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" class="form-control" placeholder="Enter password..." required>
      </div>
      <button type="submit" class="btn">Enter</button>
      <p id="loginError">⚠️ Incorrect password. Access denied.</p>
    </form>
  </div>

  <!-- Admin Panel (hidden until logged in) -->
  <div id="adminPanel">
    <section class="admin-panel animate-on-scroll visible">
      <h2>Stationmaster's Log (Add Events)</h2>
      
      <form id="addEventForm">
        <div class="form-group">
          <label>Event Date</label>
          <input type="text" id="evDate" class="form-control" placeholder="e.g., 30 April 2026" required>
        </div>
        <div class="form-group">
          <label>Event Title</label>
          <input type="text" id="evTitle" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Event Description</label>
          <textarea id="evDesc" class="form-control" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label>Event Image (Optional)</label>
          <input type="file" id="evImage" class="form-control" accept="image/*" style="padding: 10px;">
          <small style="color: var(--steam-grey); font-size: 0.8rem;">Images are automatically resized for fast loading.</small>
        </div>
        <button type="submit" class="btn">Log Event</button>
      </form>

      <div class="admin-event-list" id="adminEventList">
        <!-- Mapped list of events -->
      </div>
    </section>
  </div>

  <div id="toast">Message</div>

  <script>
    // ---- JSONBin Config ----
    const JSONBIN_ID = '69d91b68856a6821891cd402';
    const JSONBIN_KEY = '$2a$10$CM479TANRw1x9/3CM3yf9uPeKeI0XJG0a3owqmRqa6IxXP4RQK5si';
    const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

    // ---- PASSWORD CONFIG ----
    const ADMIN_PASSWORD = 'railway2024';

    // ---- LOGIN GATE ----
    if (sessionStorage.getItem('adminAuth') === 'true') {
      showAdminPanel();
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const entered = document.getElementById('adminPassword').value;
      if (entered === ADMIN_PASSWORD) {
        sessionStorage.setItem('adminAuth', 'true');
        showAdminPanel();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('adminPassword').value = '';
      }
    });

    function showAdminPanel() {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderAdminList();
    }

    // ---- JSONBin helpers ----
    function getEvents() {
      const cacheBuster = `?t=${Date.now()}`;
      return fetch(`${BIN_URL}/latest${cacheBuster}`, {
        headers: { 'X-Master-Key': JSONBIN_KEY }
      })
      .then(res => {
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        return res.json();
      })
      .then(data => data.record.events || [])
      .catch(err => {
        console.error("Get events error:", err);
        return [];
      });
    }

    function saveEvents(events) {
      return fetch(BIN_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_KEY
        },
        body: JSON.stringify({ events })
      }).then(res => {
        if (!res.ok) {
          return res.json().then(errData => {
            throw new Error(errData.message || `Save failed with status ${res.status}`);
          });
        }
        return res.json();
      });
    }

    // ---- Render admin event list ----
    function renderAdminList() {
      const container = document.getElementById('adminEventList');
      container.innerHTML = '<p style="font-family:var(--font-body);">Loading events...</p>';

      getEvents().then(events => {
        container.innerHTML = '<h3>Current Logged Events</h3>';

        if (events.length === 0) {
          container.innerHTML += '<p style="font-family:var(--font-body); color:#666;">No events logged yet.</p>';
          return;
        }

        events.forEach((ev, index) => {
          const item = document.createElement('div');
          item.className = 'admin-event-item';
          item.innerHTML = `
            <div style="display: flex; align-items: center; gap: 15px;">
              ${ev.image ? `<img src="${ev.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;">` : ''}
              <div><strong>${ev.date}</strong>: ${ev.title}</div>
            </div>
            <button onclick="removeEvent(${index})">Remove</button>
          `;
          container.appendChild(item);
        });
      });
    }

    // ---- Remove event ----
    function removeEvent(index) {
      getEvents().then(events => {
        events.splice(index, 1);
        return saveEvents(events);
      }).then(() => {
        renderAdminList();
        showToast('Event scrubbed from log.');
      });
    }

    // ---- Image Compression ----
    function compressImage(file) {
      return new Promise((resolve) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 600;
            const MAX_HEIGHT = 600;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.5)); // Compress to 50% quality for smaller storage
          };
        };
      });
    }

    // ---- Add event ----
    document.getElementById('addEventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn');
      const originalText = btn.innerText;
      btn.innerText = 'Processing Image...';
      btn.disabled = true;

      const imageFile = document.getElementById('evImage').files[0];
      const imageData = await compressImage(imageFile);

      btn.innerText = 'Saving...';

      const newEv = {
        id: Date.now(),
        date: document.getElementById('evDate').value,
        title: document.getElementById('evTitle').value,
        description: document.getElementById('evDesc').value,
        image: imageData
      };

      getEvents().then(events => {
        events.push(newEv);
        return saveEvents(events);
      }).then(() => {
        e.target.reset();
        renderAdminList();
        showToast('New event logged successfully.');
        btn.innerText = originalText;
        btn.disabled = false;
      }).catch(err => {
        console.error("Save error:", err);
        showToast(`Error: ${err.message}`);
        btn.innerText = originalText;
        btn.disabled = false;
      });
    });

    // ---- Toast ----
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.className = 'show';
      setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
    }
  </script>
</body>
</html>
